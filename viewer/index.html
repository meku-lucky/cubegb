<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CubeGB Viewer</title>
<!--
  ============================================================================
  CubeGB Viewer  (Phase 1)
  ----------------------------------------------------------------------------
  A single self-contained web viewer for .cgb files (CubeGB's parametric
  primitive format, see docs/cgb-format.md).

  USAGE:
    1. Open this file directly in a modern browser (Chrome, Firefox, Safari,
       Edge). No build step, no server required — just double-click it, or
       open it via File > Open.  (Loads three.js from a CDN, so you need an
       internet connection the first time.)
    2. Load a model either by:
         - dragging a .cgb file anywhere onto the page, OR
         - clicking the "Load .cgb" button and picking a file.
    3. Orbit with left-drag, pan with right-drag, zoom with the wheel.
    4. Click an item in the primitives list to focus/highlight it.

  Geometry conventions match the Python baker exactly: Y-up, right-handed,
  meters; transform order scale -> rotate(XYZ radians) -> translate; positions
  are world-space; `parent` is logical-only (no transform composition).
  ============================================================================
-->
<style>
  :root {
    --bg: #1a1d23;
    --panel: #23272f;
    --panel-2: #2c313b;
    --border: #3a404c;
    --text: #e6e9ef;
    --text-dim: #9aa3b2;
    --accent: #5b9dff;
    --accent-2: #3f7fe0;
    --error-bg: #3a1f24;
    --error-border: #b3404c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
  }
  #app { position: relative; width: 100vw; height: 100vh; }
  #viewport { position: absolute; inset: 0; }
  canvas { display: block; }

  /* ---- UI panel ---- */
  #panel {
    position: absolute;
    top: 16px;
    left: 16px;
    width: 280px;
    max-height: calc(100vh - 32px);
    display: flex;
    flex-direction: column;
    background: rgba(35, 39, 47, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    overflow: hidden;
    z-index: 10;
  }
  #panel header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  #panel header h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #panel header h1 .logo {
    width: 14px; height: 14px;
    border-radius: 3px;
    background: linear-gradient(135deg, var(--accent), #8a5bff);
    box-shadow: 0 0 8px rgba(91,157,255,0.5);
  }
  #panel header .sub {
    margin-top: 3px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .panel-body { padding: 12px 16px; overflow-y: auto; }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--accent-2);
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
  }
  .btn:hover { background: var(--accent-2); }
  .btn:active { transform: translateY(1px); }
  .hint {
    margin: 10px 0 4px;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }

  .section-label {
    margin: 14px 0 6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
  }
  #primList { list-style: none; margin: 0; padding: 0; }
  #primList li {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 8px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.12s;
  }
  #primList li:hover { background: var(--panel-2); }
  #primList li.active { background: rgba(91,157,255,0.18); outline: 1px solid var(--accent); }
  #primList .swatch {
    width: 14px; height: 14px; flex: 0 0 14px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.18);
  }
  #primList .meta { min-width: 0; }
  #primList .name {
    font-size: 13px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #primList .type { font-size: 11px; color: var(--text-dim); }
  .empty { font-size: 12px; color: var(--text-dim); font-style: italic; padding: 4px 2px; }

  /* ---- drag overlay ---- */
  #dropOverlay {
    position: absolute; inset: 0; z-index: 50;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(20,24,32,0.78);
    border: 3px dashed var(--accent);
    border-radius: 12px;
    pointer-events: none;
  }
  #dropOverlay.show { display: flex; }
  #dropOverlay .inner {
    font-size: 20px; font-weight: 600; color: var(--accent);
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }

  /* ---- error overlay ---- */
  #errorOverlay {
    position: absolute;
    bottom: 16px; left: 16px;
    max-width: 360px;
    display: none;
    padding: 12px 14px;
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: 10px;
    z-index: 60;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  }
  #errorOverlay.show { display: block; }
  #errorOverlay .title { font-weight: 700; margin-bottom: 4px; color: #ff9aa3; }
  #errorOverlay .msg { font-size: 12px; color: var(--text); white-space: pre-wrap; word-break: break-word; }
  #errorOverlay .close {
    position: absolute; top: 6px; right: 8px;
    cursor: pointer; color: var(--text-dim); font-size: 16px; line-height: 1;
  }
  #errorOverlay .close:hover { color: var(--text); }

  /* ---- status / help bottom-right ---- */
  #status {
    position: absolute;
    bottom: 12px; right: 14px;
    font-size: 11px; color: var(--text-dim);
    z-index: 10;
    text-align: right;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="app">
  <div id="viewport"></div>

  <div id="panel">
    <header>
      <h1><span class="logo"></span>CubeGB Viewer</h1>
      <div class="sub">Parametric .cgb primitive viewer</div>
    </header>
    <div class="panel-body">
      <button id="loadBtn" class="btn">Load .cgb</button>
      <input id="fileInput" type="file" accept=".cgb,application/json" style="display:none" />
      <div class="hint">or drag &amp; drop a .cgb file anywhere</div>

      <div class="section-label">
        <span>Primitives</span>
        <span id="primCount"></span>
      </div>
      <ul id="primList"></ul>
      <div id="emptyMsg" class="empty">No model loaded.</div>
    </div>
  </div>

  <div id="dropOverlay"><div class="inner">Drop .cgb to load</div></div>

  <div id="errorOverlay">
    <span class="close" id="errClose">&times;</span>
    <div class="title">Could not load file</div>
    <div class="msg" id="errMsg"></div>
  </div>

  <div id="status">left-drag orbit · right-drag pan · wheel zoom</div>
</div>

<!-- three.js via CDN: importmap + ES modules (r160+ pattern) -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------------------------------------------------------------------------
// DOM references
// ---------------------------------------------------------------------------
const viewportEl = document.getElementById('viewport');
const loadBtn    = document.getElementById('loadBtn');
const fileInput  = document.getElementById('fileInput');
const primList   = document.getElementById('primList');
const primCount  = document.getElementById('primCount');
const emptyMsg   = document.getElementById('emptyMsg');
const dropOverlay= document.getElementById('dropOverlay');
const errorOverlay = document.getElementById('errorOverlay');
const errMsg     = document.getElementById('errMsg');
const errClose   = document.getElementById('errClose');

// ---------------------------------------------------------------------------
// Scene / renderer setup
// ---------------------------------------------------------------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1d23);

const camera = new THREE.PerspectiveCamera(
  50, window.innerWidth / window.innerHeight, 0.01, 5000
);
camera.position.set(4, 3, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
viewportEl.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0.5, 0);

// ---- lighting ----
const hemi = new THREE.HemisphereLight(0xdfe9ff, 0x2a2620, 0.9);
scene.add(hemi);

const dir = new THREE.DirectionalLight(0xffffff, 1.6);
dir.position.set(5, 10, 7);
scene.add(dir);

const fill = new THREE.DirectionalLight(0xbcd2ff, 0.35);
fill.position.set(-6, 4, -5);
scene.add(fill);

// ---- helpers ----
let grid = new THREE.GridHelper(20, 20, 0x4a5160, 0x32373f);
grid.material.opacity = 0.6;
grid.material.transparent = true;
scene.add(grid);

const axes = new THREE.AxesHelper(1.5);
scene.add(axes);

// Group holding the currently loaded model (so we can clear it cleanly).
let modelGroup = new THREE.Group();
scene.add(modelGroup);

// Map of primitive id -> { mesh, baseColor, listItem } for highlighting.
let primEntries = [];
let activeId = null;

const DEFAULT_COLOR = [0.7, 0.7, 0.72];

// ---------------------------------------------------------------------------
// Geometry builders — MUST match the Python baker conventions.
// ---------------------------------------------------------------------------
// Partial sweep (matches bake/baker.py:_sweep_params). Returns null for a full
// 0..360 sweep so the native three.js geometry is used unchanged.
function sweepParams(params) {
  if (params.sweep_start == null && params.sweep_end == null) return null;
  const start = (params.sweep_start != null) ? params.sweep_start : 0;
  const end = (params.sweep_end != null) ? params.sweep_end : 360;
  if (Math.abs((end - start) - 360) <= 1e-6) return null;
  const caps = (params.sweep_caps != null) ? !!params.sweep_caps : true;
  return { start: start * Math.PI / 180, length: (end - start) * Math.PI / 180, caps };
}

// Hand-built wedge geometry — vertex placement matches bake/baker.py exactly
// (x = r*sin(theta), z = r*cos(theta), axis +Y). A cone is the rTop === 0 case.
function buildSweptGeometry(rBottom, rTop, height, segments, thetaStart, thetaLength, caps) {
  const n = Math.max(2, segments | 0);
  const half = height / 2;
  const EPS = 1e-6;
  const pos = [];
  const idx = [];
  const bot = [];
  const top = [];
  for (let i = 0; i <= n; i++) {
    const theta = thetaStart + (i / n) * thetaLength;
    const sx = Math.sin(theta), cz = Math.cos(theta);
    bot.push(pos.length / 3); pos.push(rBottom * sx, -half, rBottom * cz);
    top.push(pos.length / 3); pos.push(rTop * sx, half, rTop * cz);
  }
  for (let i = 0; i < n; i++) {
    const b0 = bot[i], b1 = bot[i + 1], t0 = top[i], t1 = top[i + 1];
    if (rBottom > EPS) idx.push(b0, b1, t1);
    if (rTop > EPS) idx.push(b0, t1, t0);
    if (rBottom <= EPS && rTop > EPS) idx.push(b0, b1, t1);
  }
  if (rBottom > EPS) {
    const c = pos.length / 3; pos.push(0, -half, 0);
    for (let i = 0; i < n; i++) idx.push(c, bot[i + 1], bot[i]);
  }
  if (rTop > EPS) {
    const c = pos.length / 3; pos.push(0, half, 0);
    for (let i = 0; i < n; i++) idx.push(c, top[i], top[i + 1]);
  }
  if (caps) {
    const ends = [[0, false], [n, true]];
    for (let e = 0; e < ends.length; e++) {
      const i = ends[e][0], flip = ends[e][1];
      const ab = pos.length / 3; pos.push(0, -half, 0);
      const at = pos.length / 3; pos.push(0, half, 0);
      let q = [ab, bot[i], top[i], at];
      if (flip) q = q.slice().reverse();
      idx.push(q[0], q[1], q[2], q[0], q[2], q[3]);
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setIndex(idx);
  g.computeVertexNormals();
  return g;
}

function buildGeometry(type, params) {
  params = params || {};
  const segments = (params.segments != null) ? params.segments : 16;
  switch (type) {
    case 'cube': {
      const s = params.size || [1, 1, 1];
      return new THREE.BoxGeometry(s[0], s[1], s[2]);
    }
    case 'sphere': {
      const r = params.radius != null ? params.radius : 0.5;
      const heightSeg = Math.max(3, Math.floor(segments / 2));
      return new THREE.SphereGeometry(r, segments, heightSeg);
    }
    case 'cylinder': {
      const r = params.radius != null ? params.radius : 0.5;
      const h = params.height != null ? params.height : 1;
      const sw = sweepParams(params);
      if (sw) return buildSweptGeometry(r, r, h, segments, sw.start, sw.length, sw.caps);
      return new THREE.CylinderGeometry(r, r, h, segments);
    }
    case 'cone': {
      const r = params.radius != null ? params.radius : 0.5;
      const h = params.height != null ? params.height : 1;
      const sw = sweepParams(params);
      if (sw) return buildSweptGeometry(r, 0, h, segments, sw.start, sw.length, sw.caps);
      // three.js ConeGeometry is centered with apex at +Y, base at -Y. Correct.
      return new THREE.ConeGeometry(r, h, segments);
    }
    default:
      throw new Error('Unknown primitive type: "' + type + '"');
  }
}

// Local-space shape deform (taper along +Y) — identical formula to
// bake/baker.py:_apply_deform so the preview matches the baked mesh.
function applyDeform(geom, deform) {
  if (!deform) return;
  const taper = deform.taper;
  if (taper) {
    const tx = taper[0], tz = taper[1];
    const pos = geom.attributes.position;
    let ymin = Infinity, ymax = -Infinity;
    for (let i = 0; i < pos.count; i++) {
      const y = pos.getY(i);
      if (y < ymin) ymin = y;
      if (y > ymax) ymax = y;
    }
    const h = ymax - ymin;
    if (h > 1e-9) {
      for (let i = 0; i < pos.count; i++) {
        const t = (pos.getY(i) - ymin) / h;
        pos.setX(i, pos.getX(i) * (1 + (tx - 1) * t));
        pos.setZ(i, pos.getZ(i) * (1 + (tz - 1) * t));
      }
      pos.needsUpdate = true;
      geom.computeVertexNormals();
    }
  }
}

// ---------------------------------------------------------------------------
// Validation + model construction
// ---------------------------------------------------------------------------
function validateDoc(doc) {
  if (doc == null || typeof doc !== 'object') {
    throw new Error('File does not contain a JSON object.');
  }
  if (doc.format !== 'cgb') {
    throw new Error('Not a CubeGB file: expected "format":"cgb" but got '
      + JSON.stringify(doc.format) + '.');
  }
  if (!Array.isArray(doc.primitives)) {
    throw new Error('Invalid .cgb: "primitives" must be an array.');
  }
}

function buildModel(doc) {
  clearModel();

  const newGroup = new THREE.Group();
  const entries = [];

  doc.primitives.forEach((prim, idx) => {
    const type = prim.type;
    const geom = buildGeometry(type, prim.params);
    applyDeform(geom, prim.deform);

    const colorArr = (prim.material && Array.isArray(prim.material.color))
      ? prim.material.color : DEFAULT_COLOR;
    const color = new THREE.Color(colorArr[0], colorArr[1], colorArr[2]);

    const mat = new THREE.MeshStandardMaterial({
      color: color,
      roughness: 0.75,
      metalness: 0.05,
      flatShading: false
    });

    const mesh = new THREE.Mesh(geom, mat);
    mesh.name = prim.name || prim.id || ('primitive_' + idx);

    // Transform: scale -> rotate(XYZ radians) -> translate(world position).
    // (parent is logical-only in v0.1: every primitive is placed in world space.)
    const t = prim.transform || {};
    const pos = t.position || [0, 0, 0];
    const rot = t.rotation_euler || [0, 0, 0];
    const scl = t.scale || [1, 1, 1];

    mesh.rotation.order = 'XYZ';
    mesh.scale.set(scl[0], scl[1], scl[2]);
    mesh.rotation.set(rot[0], rot[1], rot[2]);
    mesh.position.set(pos[0], pos[1], pos[2]);

    // Subtle edge overlay so low-poly shapes read clearly.
    const edges = new THREE.EdgesGeometry(geom, 25);
    const edgeLines = new THREE.LineSegments(
      edges,
      new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.22 })
    );
    mesh.add(edgeLines);

    newGroup.add(mesh);

    entries.push({
      id: prim.id != null ? prim.id : ('idx_' + idx),
      mesh: mesh,
      baseColor: color.clone(),
      name: mesh.name,
      type: type,
      colorHex: '#' + color.getHexString()
    });
  });

  modelGroup = newGroup;
  scene.add(modelGroup);
  primEntries = entries;

  rebuildList();
  frameModel();
}

function clearModel() {
  if (modelGroup) {
    modelGroup.traverse((obj) => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
        else obj.material.dispose();
      }
    });
    scene.remove(modelGroup);
  }
  primEntries = [];
  activeId = null;
}

// ---------------------------------------------------------------------------
// Camera framing — fit the loaded model's bounding box.
// ---------------------------------------------------------------------------
function frameModel() {
  if (!primEntries.length) return;
  const box = new THREE.Box3().setFromObject(modelGroup);
  if (box.isEmpty()) return;

  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;

  const fov = camera.fov * (Math.PI / 180);
  let dist = (maxDim / 2) / Math.tan(fov / 2);
  dist *= 1.7; // padding

  // Place camera on a pleasant 3/4 angle.
  const d = new THREE.Vector3(1, 0.8, 1.2).normalize().multiplyScalar(dist);
  camera.position.copy(center).add(d);
  camera.near = Math.max(0.001, dist / 1000);
  camera.far = dist * 1000;
  camera.updateProjectionMatrix();

  controls.target.copy(center);
  controls.update();

  // Resize grid to roughly span the model footprint.
  const span = Math.max(4, Math.ceil(maxDim * 2));
  scene.remove(grid);
  grid.geometry.dispose();
  grid.material.dispose();
  grid = new THREE.GridHelper(span, span, 0x4a5160, 0x32373f);
  grid.material.opacity = 0.6;
  grid.material.transparent = true;
  scene.add(grid);
}

// ---------------------------------------------------------------------------
// Primitive list UI
// ---------------------------------------------------------------------------
function rebuildList() {
  primList.innerHTML = '';
  if (!primEntries.length) {
    emptyMsg.style.display = 'block';
    primCount.textContent = '';
    return;
  }
  emptyMsg.style.display = 'none';
  primCount.textContent = String(primEntries.length);

  primEntries.forEach((entry) => {
    const li = document.createElement('li');
    li.dataset.id = entry.id;

    const swatch = document.createElement('span');
    swatch.className = 'swatch';
    swatch.style.background = entry.colorHex;

    const meta = document.createElement('div');
    meta.className = 'meta';
    const nm = document.createElement('div');
    nm.className = 'name';
    nm.textContent = entry.name;
    const tp = document.createElement('div');
    tp.className = 'type';
    tp.textContent = entry.type;
    meta.appendChild(nm);
    meta.appendChild(tp);

    li.appendChild(swatch);
    li.appendChild(meta);
    li.addEventListener('click', () => selectPrimitive(entry.id));
    entry.listItem = li;
    primList.appendChild(li);
  });
}

function selectPrimitive(id) {
  // Toggle off if clicking the active one.
  if (activeId === id) { clearSelection(); return; }
  clearSelection();
  activeId = id;

  const entry = primEntries.find(e => e.id === id);
  if (!entry) return;

  entry.listItem.classList.add('active');
  // Highlight: emissive glow.
  entry.mesh.material.emissive = new THREE.Color(0x5b9dff);
  entry.mesh.material.emissiveIntensity = 0.45;

  // Focus camera on the primitive.
  const box = new THREE.Box3().setFromObject(entry.mesh);
  if (!box.isEmpty()) {
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z) || 0.5;
    const fov = camera.fov * (Math.PI / 180);
    let dist = (maxDim / 2) / Math.tan(fov / 2) * 2.4;
    const dir3 = new THREE.Vector3().subVectors(camera.position, controls.target);
    if (dir3.lengthSq() < 1e-6) dir3.set(1, 0.8, 1.2);
    dir3.normalize().multiplyScalar(dist);
    camera.position.copy(center).add(dir3);
    controls.target.copy(center);
    controls.update();
  }
}

function clearSelection() {
  primEntries.forEach((e) => {
    if (e.listItem) e.listItem.classList.remove('active');
    if (e.mesh && e.mesh.material) {
      e.mesh.material.emissive = new THREE.Color(0x000000);
      e.mesh.material.emissiveIntensity = 0;
    }
  });
  activeId = null;
}

// ---------------------------------------------------------------------------
// File loading
// ---------------------------------------------------------------------------
function showError(msg) {
  errMsg.textContent = msg;
  errorOverlay.classList.add('show');
}
function hideError() { errorOverlay.classList.remove('show'); }
errClose.addEventListener('click', hideError);

function loadText(text, filename) {
  hideError();
  let doc;
  try {
    doc = JSON.parse(text);
  } catch (e) {
    showError('"' + (filename || 'file') + '" is not valid JSON.\n\n' + e.message);
    return;
  }
  try {
    validateDoc(doc);
    buildModel(doc);
  } catch (e) {
    showError(e.message);
  }
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => loadText(ev.target.result, file.name);
  reader.onerror = () => showError('Could not read file "' + file.name + '".');
  reader.readAsText(file);
}

// File picker
loadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (ev) => {
  if (ev.target.files && ev.target.files[0]) handleFile(ev.target.files[0]);
  fileInput.value = ''; // allow re-loading the same file
});

// Drag & drop (whole window)
let dragDepth = 0;
window.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragDepth++;
  dropOverlay.classList.add('show');
});
window.addEventListener('dragover', (e) => { e.preventDefault(); });
window.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragDepth = Math.max(0, dragDepth - 1);
  if (dragDepth === 0) dropOverlay.classList.remove('show');
});
window.addEventListener('drop', (e) => {
  e.preventDefault();
  dragDepth = 0;
  dropOverlay.classList.remove('show');
  if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]) {
    handleFile(e.dataTransfer.files[0]);
  }
});

// ---------------------------------------------------------------------------
// Resize + render loop
// ---------------------------------------------------------------------------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
